name: Update AI Blocklist

on:
  schedule:
    # Every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch:  # allow manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run updater
        run: python scripts/update.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet docs/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "blocklist-bot"
          git config user.email "blocklist-bot@users.noreply.github.com"
          DOMAIN_COUNT=$(python -c "import json; print(json.load(open('docs/metadata.json'))['domain_count'])")
          git add docs/
          git commit -m "chore: auto-update blocklist — ${DOMAIN_COUNT} domains [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      - name: Sync to NextDNS denylist
        env:
          NEXTDNS_API_KEY: ${{ secrets.NEXTDNS_API_KEY }}
          NEXTDNS_PROFILE_ID: "2a7d5a"
        run: |
          python - << 'PYEOF'
          import json, urllib.request, urllib.error, os, time
          from pathlib import Path

          API_KEY = os.environ["NEXTDNS_API_KEY"]
          PROFILE_ID = os.environ["NEXTDNS_PROFILE_ID"]
          BASE_URL = f"https://api.nextdns.io/profiles/{PROFILE_ID}/denylist"
          HEADERS = {"X-Api-Key": API_KEY, "Content-Type": "application/json"}

          domains = [
              d.strip() for d in Path("docs/domains.txt").read_text().splitlines()
              if d.strip() and not d.startswith("#")
          ]
          print(f"Syncing {len(domains)} domains to NextDNS denylist...")

          # Fetch existing entries
          req = urllib.request.Request(BASE_URL, headers=HEADERS)
          try:
              with urllib.request.urlopen(req, timeout=15) as r:
                  existing = {item["id"] for item in json.loads(r.read()).get("data", [])}
              print(f"  {len(existing)} already in denylist")
          except Exception as e:
              print(f"  Could not fetch existing denylist: {e}")
              existing = set()

          new_domains = [d for d in domains if d not in existing]
          print(f"  Adding {len(new_domains)} new domains...")

          added = 0
          errors = 0
          for domain in new_domains:
              payload = json.dumps({"id": domain, "active": True}).encode()
              req = urllib.request.Request(BASE_URL, data=payload, headers=HEADERS, method="POST")
              try:
                  with urllib.request.urlopen(req, timeout=10) as r:
                      added += 1
              except urllib.error.HTTPError as e:
                  if e.code == 409:
                      pass
                  else:
                      errors += 1
                      print(f"  [WARN] Failed {domain}: HTTP {e.code}")
              except Exception as e:
                  errors += 1
                  print(f"  [WARN] Failed {domain}: {e}")
              time.sleep(0.05)

          print(f"  Done: {added} added, {errors} errors, {len(existing)} already present")
          PYEOF

  # Publish docs/ to GitHub Pages after every successful update
  deploy-pages:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main  # pick up any commits from the update job

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
