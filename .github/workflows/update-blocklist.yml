name: Update AI Blocklist

on:
  schedule:
    # Every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch:  # allow manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run updater
        run: python scripts/update.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet docs/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "blocklist-bot"
          git config user.email "blocklist-bot@users.noreply.github.com"
          DOMAIN_COUNT=$(python -c "import json; print(json.load(open('docs/metadata.json'))['domain_count'])")
          git add docs/
          git commit -m "chore: auto-update blocklist — ${DOMAIN_COUNT} domains [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      - name: Sync to NextDNS denylist
        env:
          NEXTDNS_API_KEY: ${{ secrets.NEXTDNS_API_KEY }}
          NEXTDNS_PROFILE_ID: "2a7d5a"
        run: python scripts/nextdns_sync.py

  # Publish docs/ to GitHub Pages after every successful update
  deploy-pages:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main  # pick up any commits from the update job

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
